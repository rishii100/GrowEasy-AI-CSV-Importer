services:
  - type: web
    name: groweasy-csv-importer-backend
    env: node
    region: singapore
    plan: free
    rootDir: backend
    buildCommand: npm install
    startCommand: node src/index.js
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: BATCH_SIZE
        value: 15
      - key: MAX_RETRIES
        value: 3
      - key: GROQ_API_KEY
        sync: false
      - key: FRONTEND_URL
        sync: false
